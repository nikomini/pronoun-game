<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pronoun Speed Game</title>
<style>
body { font-family: Arial; text-align:center; }
table { border-collapse: collapse; margin:auto; }
td,th { border:1px solid black; padding:14px 18px; font-size:26px; }
.blank { background:yellow; }
button { margin:8px; padding:14px 20px; font-size:22px; }
#score, #timer, #combo { font-size:26px; margin:10px; }
.flashWrong { background-color:#ffb3b3; }
</style>
</head>
<body>

<h1>Pronoun Speed Game ⚡</h1>

<div>
名前：<input id="name">
</div>

<div>
<button onclick="start(60)">60秒</button>
<button onclick="start(30)">30秒</button>
<button onclick="reviewMode()">ミス復習</button>
</div>

<p id="timer"></p>
<p id="score"></p>
<p id="combo"></p>

<div id="table"></div>
<div id="choices"></div>

<h2>🏆 ランキング</h2>
<div id="ranking"></div>

<!-- 🔥 Firebase（安定版） -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyAD4I9A3vs0a-PabuxGZHqiJa30Qz-T9Zw",
  authDomain: "pronoun-game-c64f4.firebaseapp.com",
  projectId: "pronoun-game-c64f4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== ゲーム =====

const data = [
 ["I","my","me","mine"],
 ["you","your","you","yours"],
 ["he","his","him","his"],
 ["she","her","her","hers"],
 ["it","its","it",null],
 ["we","our","us","ours"],
 ["you","your","you","yours"],
 ["they","their","them","theirs"]
];

const answers = [
"I","my","me","mine","you","your","yours",
"he","his","him","she","her","hers",
"it","its","we","our","us","ours",
"they","their","them","theirs"
];

let score=0, time=60, correct, timer;
let combo=0;
let mistakes=[];
let mode="normal";

function pickCell(){
 let r,c;
 do{
  r=Math.floor(Math.random()*data.length);
  c=Math.floor(Math.random()*4);
 }while(data[r][c]==null);
 return {r,c};
}

function newQ(){
 let cell = pickCell();
 const {r,c} = cell;
 correct = data[r][c];

 let html="<table><tr><th>～は</th><th>～の</th><th>～を</th><th>～のもの</th></tr>";
 data.forEach((row,i)=>{
  html+="<tr>";
  row.forEach((cellVal,j)=>{
   html += (i==r && j==c) ? "<td class='blank'>???</td>" : `<td>${cellVal||""}</td>`;
  });
  html+="</tr>";
 });
 html+="</table>";
 document.getElementById("table").innerHTML=html;

 let opts=[...answers].sort(()=>Math.random()-0.5).slice(0,8);
 if(!opts.includes(correct)) opts[Math.floor(Math.random()*8)] = correct;

 let cdiv=document.getElementById("choices");
 cdiv.innerHTML="";
 opts.forEach(o=>{
  let b=document.createElement("button");
  b.innerText=o;
  b.onclick=()=>check(o);
  cdiv.appendChild(b);
 });
}

function check(a){
 if(a==correct){
  combo++;
  score++;
 } else {
  combo=0;
 }
 updateDisplay();
 newQ();
}

function updateDisplay(){
 document.getElementById("score").innerText="Score: "+score;
 document.getElementById("combo").innerText="Combo: "+combo;
}

function start(sec){
 const player = document.getElementById("name").value || "名無し";
 score=0; combo=0; time=sec;
 updateDisplay();

 clearInterval(timer);
 timer=setInterval(()=>{
  time--;
  document.getElementById("timer").innerText="Time: "+time;
  if(time<=0){
   clearInterval(timer);
   saveScore(player, score);
   loadRanking();
  }
 },1000);

 newQ();
}

// ===== ランキング =====

function saveScore(name, score){
 db.collection("scores").add({
   name:name,
   score:score
 });
}

function loadRanking(){
 db.collection("scores")
   .orderBy("score","desc")
   .limit(10)
   .get()
   .then(snapshot=>{
     let html="";
     snapshot.forEach(doc=>{
       const d=doc.data();
       html += d.name + " : " + d.score + "<br>";
     });
     document.getElementById("ranking").innerHTML=html;
   });
}

loadRanking();

</script>

</body>
</html>
