<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pronoun Speed Game</title>

<style>
body { font-family: Arial; text-align:center; margin:0; }

.projector #gameArea,
.projector #topArea { display:none; }
.projector #ranking { font-size:40px; }

#topArea {
 display:flex; justify-content:center; gap:10px;
 flex-wrap:wrap; margin:10px;
}

#statusBar {
 display:flex; justify-content:center; gap:40px;
 font-size:22px;
}

#gameArea {
 display:flex; justify-content:center; gap:20px;
}

#choices {
 width:220px;
 display:flex; flex-direction:column;
}

#choices button {
 margin:5px; padding:10px; font-size:16px;
}

table { border-collapse: collapse; }
td,th { border:1px solid black; padding:10px; font-size:20px; }
.blank { background:yellow; }

.correct { background:#7CFC00 !important; }
.wrong { background:#ff6666 !important; }

#finish { font-size:28px; color:red; }
</style>
</head>

<body>

<h2>Pronoun Speed Game ⚡</h2>

<div id="topArea">
クラス：<input id="class" size="5">
名前：<input id="name" size="6">
<button onclick="start(60)">60秒</button>
<button onclick="start(30)">30秒</button>
<button onclick="loadAll()">📊全体</button>
<button onclick="resetToday()">🔄リセット</button>
<button onclick="downloadCSV()">📥CSV</button>
<button onclick="toggleProjector()">🎥表示</button>
</div>

<div id="statusBar">
<div id="timer">Time: 0</div>
<div id="score">Score: 0</div>
<div id="combo">Combo: 0</div>
</div>

<div id="finish"></div>

<div id="gameArea">
<div id="table"></div>
<div id="choices"></div>
</div>

<h3>🏆 今日のランキング</h3>
<div id="ranking"></div>

<!-- 不正解音のみ -->
<audio id="ng" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyAD4I9A3vs0a-PabuxGZHqiJa30Qz-T9Zw",
 authDomain: "pronoun-game-c64f4.firebaseapp.com",
 projectId: "pronoun-game-c64f4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const today = new Date().toISOString().slice(0,10);

let score=0,time=0,correct,timer,combo=0;
let gameActive=false;

const data=[
["I","my","me","mine"],["you","your","you","yours"],
["he","his","him","his"],["she","her","her","hers"],
["it","its","it",null],["we","our","us","ours"],
["you","your","you","yours"],["they","their","them","theirs"]
];

const answers=[
"I","my","me","mine","you","your","yours",
"he","his","him","she","her","hers",
"it","its","we","our","us","ours",
"they","their","them","theirs"
];

function pickCell(){
 let r,c;
 do{
  r=Math.floor(Math.random()*data.length);
  c=Math.floor(Math.random()*4);
 }while(data[r][c]==null);
 return {r,c};
}

function newQ(){
 if(!gameActive) return;

 let {r,c}=pickCell();
 correct=data[r][c];

 let html="<table><tr><th>～は</th><th>～の</th><th>～を</th><th>～のもの</th></tr>";
 data.forEach((row,i)=>{
  html+="<tr>";
  row.forEach((cellVal,j)=>{
   html+=(i==r&&j==c)?"<td class='blank'>???</td>":`<td>${cellVal||""}</td>`;
  });
  html+="</tr>";
 });
 html+="</table>";
 table.innerHTML=html;

 let opts=[...answers].sort(()=>Math.random()-0.5).slice(0,8);
 if(!opts.includes(correct)) opts[Math.floor(Math.random()*8)] = correct;

 choices.innerHTML="";
 opts.forEach(o=>{
  let b=document.createElement("button");
  b.innerText=o;
  b.onclick=()=>check(o,b);
  choices.appendChild(b);
 });
}

function check(a,btn){
 if(!gameActive) return;

 if(a==correct){
  combo++;score++;
  btn.classList.add("correct");
 }else{
  combo=0;
  btn.classList.add("wrong");
  ng.play(); // ←ここだけ音
 }
 updateDisplay();
 setTimeout(newQ,200);
}

function updateDisplay(){
 scoreEl.innerText="Score: "+score;
 comboEl.innerText="Combo: "+combo;
}

function start(sec){
 finish.innerText="";
 let name=nameInput.value||"名無し";
 let className=classInput.value||"未設定";

 score=0;combo=0;time=sec;
 gameActive=true;

 updateDisplay();

 clearInterval(timer);
 timer=setInterval(()=>{
  time--;
  timerEl.innerText="Time: "+time;

  if(time<=0){
   clearInterval(timer);
   gameActive=false;
   finish.innerText="終了！ スコア："+score;
   saveScore(name,score,className);
   loadRanking(className);
  }
 },1000);

 newQ();
}

function medal(r){
 return r==1?"🥇":r==2?"🥈":r==3?"🥉":r+"位";
}

function saveScore(name,score,className){
 db.collection("scores").add({
  name:name,score:score,class:className,date:today
 });
}

function loadRanking(className){
 db.collection("scores")
 .where("class","==",className)
 .where("date","==",today)
 .orderBy("score","desc")
 .limit(10)
 .get()
 .then(s=>{
  let html="";let r=1;
  s.forEach(doc=>{
   let d=doc.data();
   html+=medal(r)+" "+d.name+" : "+d.score+"<br>";
   r++;
  });
  ranking.innerHTML=html;
 });
}

function loadAll(){
 db.collection("scores")
 .where("date","==",today)
 .orderBy("score","desc")
 .limit(20)
 .get()
 .then(s=>{
  let html="<b>全体ランキング</b><br>";
  let r=1;
  s.forEach(doc=>{
   let d=doc.data();
   html+=medal(r)+" "+d.class+"-"+d.name+" : "+d.score+"<br>";
   r++;
  });
  ranking.innerHTML=html;
 });
}

function resetToday(){
 if(!confirm("今日のランキングを削除しますか？")) return;
 db.collection("scores").where("date","==",today)
 .get()
 .then(s=>{
  s.forEach(doc=>doc.ref.delete());
  ranking.innerHTML="リセットしました";
 });
}

function downloadCSV(){
 db.collection("scores").where("date","==",today)
 .get().then(s=>{
  let csv="class,name,score\n";
  s.forEach(doc=>{
   let d=doc.data();
   csv+=`${d.class},${d.name},${d.score}\n`;
  });
  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="ranking.csv";
  a.click();
 });
}

function toggleProjector(){
 document.body.classList.toggle("projector");
}

/* 参照 */
const table=document.getElementById("table");
const choices=document.getElementById("choices");
const nameInput=document.getElementById("name");
const classInput=document.getElementById("class");
const timerEl=document.getElementById("timer");
const scoreEl=document.getElementById("score");
const comboEl=document.getElementById("combo");
const ranking=document.getElementById("ranking");
const finish=document.getElementById("finish");
const ng=document.getElementById("ng");

</script>

</body>
</html>
