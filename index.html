<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pronoun Game</title>

<style>
body { font-family: Arial; text-align:center; }

#statusBar {
 display:flex;
 justify-content:center;
 gap:30px;
 font-size:20px;
 margin:10px;
}

#gameArea {
 display:flex;
 justify-content:center;
 gap:20px;
}

#choices {
 width:200px;
 display:flex;
 flex-direction:column;
}

#choices button {
 margin:5px;
 padding:10px;
 font-size:16px;
}

table { border-collapse: collapse; }
td { border:1px solid black; padding:10px; }

.blank { background:yellow; }
.correct { background:#7CFC00; }
.wrong { background:#ff6666; }
</style>

</head>

<body>

<h2>Pronoun Speed Game</h2>

名前：<input id="name">
<button onclick="start()">スタート</button>

<div id="statusBar">
<div id="timer">Time: 30</div>
<div id="score">Score: 0</div>
<div id="combo">Combo: 0</div>
</div>

<div id="finish"></div>

<div id="gameArea">
<div id="table"></div>
<div id="choices"></div>
</div>

<!-- 不正解音 -->
<audio id="ng" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

<script>

const ng = document.getElementById("ng");

let score=0, combo=0, time=30;
let timer, correct;
let gameActive=false;

const data = [
 ["I","my","me","mine"],
 ["you","your","you","yours"],
 ["he","his","him","his"],
 ["she","her","her","hers"]
];

const answers = ["I","my","me","mine","you","your","yours","he","his","him","she","her","hers"];

function pick(){
 let r = Math.floor(Math.random()*data.length);
 let c = Math.floor(Math.random()*4);
 return {r,c};
}

function newQ(){
 if(!gameActive) return;

 let {r,c} = pick();
 correct = data[r][c];

 let html="<table>";
 data.forEach((row,i)=>{
  html+="<tr>";
  row.forEach((v,j)=>{
   html += (i==r && j==c) ? "<td class='blank'>???</td>" : "<td>"+v+"</td>";
  });
  html+="</tr>";
 });
 html+="</table>";
 document.getElementById("table").innerHTML = html;

 let opts = [...answers].sort(()=>Math.random()-0.5).slice(0,6);

 let cdiv = document.getElementById("choices");
 cdiv.innerHTML="";
 opts.forEach(o=>{
  let b=document.createElement("button");
  b.innerText=o;
  b.onclick=()=>check(o,b);
  cdiv.appendChild(b);
 });
}

function check(a,btn){
 if(!gameActive) return;

 if(a==correct){
  combo++; score++;
  btn.classList.add("correct");
 }else{
  combo=0;
  btn.classList.add("wrong");
  ng.currentTime=0;
  ng.play().catch(()=>{});
 }

 update();
 setTimeout(newQ,200);
}

function update(){
 document.getElementById("score").innerText="Score: "+score;
 document.getElementById("combo").innerText="Combo: "+combo;
}

function start(){
 score=0; combo=0; time=30;
 gameActive=true;

 update();

 clearInterval(timer);
 timer=setInterval(()=>{
  time--;
  document.getElementById("timer").innerText="Time: "+time;

  if(time<=0){
   clearInterval(timer);
   gameActive=false;
   document.getElementById("finish").innerText="終了！ スコア："+score;
  }
 },1000);

 newQ();
}

</script>

</body>
</html>
