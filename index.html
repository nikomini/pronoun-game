<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pronoun Speed Game</title>

<style>
body { font-family: Arial; text-align:center; }

#statusBar {
 display:flex;
 justify-content:center;
 gap:30px;
 font-size:20px;
 margin:10px;
}

#gameArea {
 display:flex;
 justify-content:center;
 gap:20px;
}

#choices {
 width:200px;
 display:flex;
 flex-direction:column;
}

#choices button {
 margin:5px;
 padding:10px;
 font-size:16px;
}

table { border-collapse: collapse; }
td,th { border:1px solid black; padding:10px; }
.blank { background:yellow; }

.correct { background:#7CFC00; }
.wrong { background:#ff6666; }
</style>
</head>

<body>

<h2>Pronoun Speed Game</h2>

名前：<input id="name">
<button onclick="start()">スタート</button>

<div id="statusBar">
<div id="timer">Time: 30</div>
<div id="score">Score: 0</div>
<div id="combo">Combo: 0</div>
</div>

<div id="finish"></div>

<div id="gameArea">
<div id="table"></div>
<div id="choices"></div>
</div>

<audio id="ng" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

<script>

const ng = document.getElementById("ng");

let score=0, combo=0, time=30;
let timer, correct;
let gameActive=false;

// 🔥 音解放フラグ
let unlocked=false;

const data = [
 ["I","my","me","mine"],
 ["you","your","you","yours"],
 ["he","his","him","his"],
 ["she","her","her","hers"],
 ["it","its","it",null],
 ["we","our","us","ours"],
 ["they","their","them","theirs"]
];

const answers = [
"I","my","me","mine","you","your","yours",
"he","his","him","she","her","hers",
"it","its","we","our","us","ours",
"they","their","them","theirs"
];

function pickCell(){
 let r,c;
 do{
  r=Math.floor(Math.random()*data.length);
  c=Math.floor(Math.random()*4);
 }while(data[r][c]==null);
 return {r,c};
}

function newQ(){
 if(!gameActive) return;

 let {r,c} = pickCell();
 correct = data[r][c];

 let html="<table><tr><th>～は</th><th>～の</th><th>～を</th><th>～のもの</th></tr>";
 data.forEach((row,i)=>{
  html+="<tr>";
  row.forEach((cellVal,j)=>{
   html += (i==r && j==c) ? "<td class='blank'>???</td>" : "<td>"+(cellVal||"")+"</td>";
  });
  html+="</tr>";
 });
 html+="</table>";
 document.getElementById("table").innerHTML=html;

 let opts = [correct];
 let pool = answers.filter(a => a !== correct).sort(()=>Math.random()-0.5);

 for(let i=0;i<5;i++){
   opts.push(pool[i]);
 }

 opts.sort(()=>Math.random()-0.5);

 let cdiv = document.getElementById("choices");
 cdiv.innerHTML="";
 opts.forEach(o=>{
  let b=document.createElement("button");
  b.innerText=o;
  b.onclick=()=>check(o,b);
  cdiv.appendChild(b);
 });
}

function check(a,btn){
 if(!gameActive) return;

 if(a==correct){
  combo++; score++;
  btn.classList.add("correct");
 }else{
  combo=0;
  btn.classList.add("wrong");

  ng.currentTime=0;
  ng.play().catch(()=>{});
 }

 update();
 setTimeout(newQ,200);
}

function update(){
 document.getElementById("score").innerText="Score: "+score;
 document.getElementById("combo").innerText="Combo: "+combo;
}

function start(){
 score=0; combo=0; time=30;
 gameActive=true;

 // 🔥 音を解放（超重要）
 if(!unlocked){
   ng.play().then(()=>{
     ng.pause();
     ng.currentTime=0;
     unlocked=true;
   }).catch(()=>{});
 }

 update();

 clearInterval(timer);
 timer=setInterval(()=>{
  time--;
  document.getElementById("timer").innerText="Time: "+time;

  if(time<=0){
   clearInterval(timer);
   gameActive=false;
   document.getElementById("finish").innerText="終了！ スコア："+score;
  }
 },1000);

 newQ();
}

</script>

</body>
</html>
