<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pronoun Speed Game</title>

<style>
body { font-family: Arial; text-align:center; margin:0; }

#topArea {
 display:flex; justify-content:center; gap:10px;
 flex-wrap:wrap; margin:10px;
}

#statusBar {
 display:flex; justify-content:center; gap:30px;
 font-size:20px; margin:10px;
}

#gameArea {
 display:flex; justify-content:center; gap:20px;
}

#choices {
 width:220px; display:flex; flex-direction:column;
}

#choices button {
 margin:5px; padding:10px; font-size:16px;
}

table { border-collapse: collapse; }
td,th { border:1px solid black; padding:10px; font-size:20px; }
.blank { background:yellow; }

.correct { background:#7CFC00; }
.wrong { background:#ff6666; }

#finish { font-size:26px; color:red; margin:10px; }

.projector #gameArea,
.projector #topArea,
.projector #statusBar,
.projector #finish {
 display:none;
}
.projector #ranking {
 font-size:40px;
}

@media (max-width:800px){
 #gameArea { flex-direction:column; }
}
</style>
</head>

<body>

<h2>Pronoun Speed Game ⚡</h2>

<div id="topArea">
クラス：<input id="class" size="5" placeholder="例:1A">
名前：<input id="name" size="6">
<button onclick="start()">スタート</button>
<button onclick="loadAll()">📊全体</button>
<button onclick="resetToday()">🔄今日リセット</button>
<button onclick="downloadCSV()">📥CSV</button>
<button onclick="toggleProjector()">🎥表示</button>
</div>

<div id="statusBar">
<div id="timer">Time: 30</div>
<div id="score">Score: 0</div>
<div id="combo">Combo: 0</div>
</div>

<div id="finish"></div>

<div id="gameArea">
<div id="table"></div>
<div id="choices"></div>
</div>

<h3>🏆 今日のランキング</h3>
<div id="ranking"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAD4I9A3vs0a-PabuxGZHqiJa30Qz-T9Zw",
  authDomain: "pronoun-game-c64f4.firebaseapp.com",
  projectId: "pronoun-game-c64f4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const today = new Date().toISOString().slice(0,10);

// ===== ゲーム =====
const data = [
 ["I","my","me","mine"],
 ["you","your","you","yours"],
 ["he","his","him","his"],
 ["she","her","her","hers"],
 ["it","its","it",null],
 ["we","our","us","ours"],
 ["they","their","them","theirs"]
];

const answers = [
"I","my","me","mine","you","your","yours",
"he","his","him","she","her","hers",
"it","its","we","our","us","ours",
"they","their","them","theirs"
];

let score=0, combo=0, time=30;
let timer, correct;
let gameActive=false;

function pickCell(){
 let r,c;
 do{
  r=Math.floor(Math.random()*data.length);
  c=Math.floor(Math.random()*4);
 }while(data[r][c]==null);
 return {r,c};
}

function newQ(){
 if(!gameActive) return;

 let {r,c} = pickCell();
 correct = data[r][c];

 let html="<table><tr><th>～は</th><th>～の</th><th>～を</th><th>～のもの</th></tr>";
 data.forEach((row,i)=>{
  html+="<tr>";
  row.forEach((v,j)=>{
   html += (i==r && j==c) ? "<td class='blank'>???</td>" : "<td>"+(v||"")+"</td>";
  });
  html+="</tr>";
 });
 html+="</table>";
 document.getElementById("table").innerHTML = html;

 let opts = [correct];
 let pool = answers.filter(a => a !== correct).sort(()=>Math.random()-0.5);
 for(let i=0;i<5;i++) opts.push(pool[i]);
 opts.sort(()=>Math.random()-0.5);

 let cdiv=document.getElementById("choices");
 cdiv.innerHTML="";
 opts.forEach(o=>{
  let b=document.createElement("button");
  b.innerText=o;
  b.onclick=()=>check(o,b);
  cdiv.appendChild(b);
 });
}

function check(a,btn){
 if(!gameActive) return;

 if(a==correct){
  combo++; score++;
  btn.classList.add("correct");
 }else{
  combo=0;
  btn.classList.add("wrong");
 }

 update();
 setTimeout(newQ,200);
}

function update(){
 document.getElementById("score").innerText="Score: "+score;
 document.getElementById("combo").innerText="Combo: "+combo;
}

function start(){
 const name = document.getElementById("name").value || "名無し";
 const className = document.getElementById("class").value || "未設定";

 score=0; combo=0; time=30;
 gameActive=true;

 update();

 clearInterval(timer);
 timer=setInterval(()=>{
  time--;
  document.getElementById("timer").innerText="Time: "+time;

  if(time<=0){
   clearInterval(timer);
   gameActive=false;

   document.getElementById("finish").innerText="終了！ スコア："+score;

   saveScore(name, score, className);
   loadRanking(className);
  }
 },1000);

 newQ();
}

// ===== Firebase =====
function saveScore(name, score, className){
 db.collection("scores").add({
   name:name,
   score:score,
   class:className,
   date:today
 });
}

function medal(r){
 return r==1?"🥇":r==2?"🥈":r==3?"🥉":r+"位";
}

function loadRanking(className){
 db.collection("scores")
   .where("class","==",className)
   .where("date","==",today)
   .orderBy("score","desc")
   .limit(10)
   .get()
   .then(s=>{
     let html="";
     let r=1;
     s.forEach(doc=>{
       let d=doc.data();
       html+=medal(r)+" "+d.name+" : "+d.score+"<br>";
       r++;
     });
     document.getElementById("ranking").innerHTML=html;
   });
}

// 全体
function loadAll(){
 db.collection("scores")
   .where("date","==",today)
   .orderBy("score","desc")
   .limit(20)
   .get()
   .then(s=>{
     let html="<b>全体ランキング</b><br>";
     let r=1;
     s.forEach(doc=>{
       let d=doc.data();
       html+=medal(r)+" "+d.class+"-"+d.name+" : "+d.score+"<br>";
       r++;
     });
     document.getElementById("ranking").innerHTML=html;
   });
}

// 今日リセット
function resetToday(){
 if(!confirm("今日のデータを削除しますか？")) return;

 db.collection("scores").where("date","==",today)
   .get()
   .then(s=>{
     s.forEach(doc=>doc.ref.delete());
     document.getElementById("ranking").innerHTML="リセットしました";
   });
}

// CSV
function downloadCSV(){
 db.collection("scores")
   .where("date","==",today)
   .get()
   .then(s=>{
     let csv="class,name,score\n";
     s.forEach(doc=>{
       let d=doc.data();
       csv+=`${d.class},${d.name},${d.score}\n`;
     });
     let blob=new Blob([csv]);
     let a=document.createElement("a");
     a.href=URL.createObjectURL(blob);
     a.download="ranking.csv";
     a.click();
   });
}

// プロジェクター
function toggleProjector(){
 document.body.classList.toggle("projector");
}
</script>

</body>
</html>
