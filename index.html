<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pronoun Speed Game</title>

<style>
body { font-family: Arial; text-align:center; margin:0; }

#gameArea {
  display:flex;
  justify-content:center;
  gap:30px;
  padding:20px;
}

#choices {
  width:300px;
  display:flex;
  flex-direction:column;
}

#choices button {
  margin:8px;
  padding:18px;
  font-size:22px;
  border:none;
  border-radius:10px;
  background:#f0f0f0;
}

.correct { background:#7CFC00 !important; }
.wrong { background:#ff6666 !important; }

table { border-collapse: collapse; }
td,th { border:1px solid black; padding:16px; font-size:24px; }
.blank { background:yellow; }

@media (max-width:800px){
  #gameArea { flex-direction:column; }
}

</style>
</head>

<body>

<h1>Pronoun Speed Game ⚡</h1>

クラス：<input id="class" placeholder="例:1A"><br><br>
名前：<input id="name"><br><br>

<button onclick="start(60)">60秒</button>
<button onclick="start(30)">30秒</button>

<p id="timer"></p>
<p id="score"></p>
<p id="combo"></p>

<div id="gameArea">
  <div id="table"></div>
  <div id="choices"></div>
</div>

<h2>🏆 今日のランキング</h2>
<div id="ranking"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAD4I9A3vs0a-PabuxGZHqiJa30Qz-T9Zw",
  authDomain: "pronoun-game-c64f4.firebaseapp.com",
  projectId: "pronoun-game-c64f4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 名前固定
let playerName = localStorage.getItem("playerName");
let className = localStorage.getItem("className");

if(playerName){
 document.getElementById("name").value = playerName;
 document.getElementById("name").disabled = true;
}
if(className){
 document.getElementById("class").value = className;
 document.getElementById("class").disabled = true;
}

const today = new Date().toISOString().slice(0,10);

const data = [
 ["I","my","me","mine"],
 ["you","your","you","yours"],
 ["he","his","him","his"],
 ["she","her","her","hers"],
 ["it","its","it",null],
 ["we","our","us","ours"],
 ["you","your","you","yours"],
 ["they","their","them","theirs"]
];

const answers = [
"I","my","me","mine","you","your","yours",
"he","his","him","she","her","hers",
"it","its","we","our","us","ours",
"they","their","them","theirs"
];

let score=0, time=60, correct, timer;
let combo=0;

function pickCell(){
 let r,c;
 do{
  r=Math.floor(Math.random()*data.length);
  c=Math.floor(Math.random()*4);
 }while(data[r][c]==null);
 return {r,c};
}

function newQ(){
 let {r,c} = pickCell();
 correct = data[r][c];

 let html="<table><tr><th>～は</th><th>～の</th><th>～を</th><th>～のもの</th></tr>";
 data.forEach((row,i)=>{
  html+="<tr>";
  row.forEach((cellVal,j)=>{
   html += (i==r && j==c) ? "<td class='blank'>???</td>" : `<td>${cellVal||""}</td>`;
  });
  html+="</tr>";
 });
 html+="</table>";
 document.getElementById("table").innerHTML=html;

 let opts=[...answers].sort(()=>Math.random()-0.5).slice(0,8);
 if(!opts.includes(correct)) opts[Math.floor(Math.random()*8)] = correct;

 let cdiv=document.getElementById("choices");
 cdiv.innerHTML="";
 opts.forEach(o=>{
  let b=document.createElement("button");
  b.innerText=o;
  b.onclick=()=>check(o,b);
  cdiv.appendChild(b);
 });
}

function check(a,btn){
 if(a==correct){
  combo++;
  score++;
  btn.classList.add("correct");
 } else {
  combo=0;
  btn.classList.add("wrong");
 }
 updateDisplay();
 setTimeout(newQ,300);
}

function updateDisplay(){
 document.getElementById("score").innerText="Score: "+score;
 document.getElementById("combo").innerText="Combo: "+combo;
}

function start(sec){
 let nameInput = document.getElementById("name").value || "名無し";
 let classInput = document.getElementById("class").value || "未設定";

 // 初回だけ保存
 if(!playerName){
   localStorage.setItem("playerName", nameInput);
   document.getElementById("name").disabled = true;
 }
 if(!className){
   localStorage.setItem("className", classInput);
   document.getElementById("class").disabled = true;
 }

 score=0; combo=0; time=sec;

 clearInterval(timer);
 timer=setInterval(()=>{
  time--;
  document.getElementById("timer").innerText="Time: "+time;
  if(time<=0){
   clearInterval(timer);
   saveScore(nameInput, score, classInput);
   loadRanking(classInput);
  }
 },1000);

 newQ();
}

function saveScore(name, score, className){
 db.collection("scores").add({
   name:name,
   score:score,
   class:className,
   date:today
 });
}

function loadRanking(className){
 db.collection("scores")
   .where("class","==",className)
   .where("date","==",today)
   .orderBy("score","desc")
   .limit(10)
   .get()
   .then(snapshot=>{
     let html="";
     let rank=1;
     snapshot.forEach(doc=>{
       const d=doc.data();
       html += rank+"位 "+d.name+" : "+d.score+"<br>";
       rank++;
     });
     document.getElementById("ranking").innerHTML=html;
   });
}

</script>

</body>
</html>
