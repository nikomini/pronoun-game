<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pronoun Speed Game</title>

<style>
body { font-family: Arial; text-align:center; margin:0; }

/* 上部コンパクト化 */
#topArea {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  font-size:18px;
  margin:10px;
}

/* スコア横並び */
#statusBar {
  display:flex;
  justify-content:center;
  gap:30px;
  font-size:22px;
}

/* ゲーム横並び */
#gameArea {
  display:flex;
  justify-content:center;
  gap:30px;
  padding:10px;
}

#choices {
  width:260px;
  display:flex;
  flex-direction:column;
}

/* ボタン（少し小さく） */
#choices button {
  margin:6px;
  padding:14px;
  font-size:18px;
}

/* 表 */
table { border-collapse: collapse; }
td,th { border:1px solid black; padding:14px; font-size:22px; }
.blank { background:yellow; }

/* スマホ */
@media (max-width:800px){
  #gameArea { flex-direction:column; }
}

.correct { background:#7CFC00 !important; }
.wrong { background:#ff6666 !important; }

</style>
</head>

<body>

<h2>Pronoun Speed Game ⚡</h2>

<div id="topArea">
  クラス：<input id="class" size="5">
  名前：<input id="name" size="6">
  <button onclick="start(60)">60秒</button>
  <button onclick="start(30)">30秒</button>
</div>

<div id="statusBar">
  <div id="timer">Time: 0</div>
  <div id="score">Score: 0</div>
  <div id="combo">Combo: 0</div>
</div>

<div id="gameArea">
  <div id="table"></div>
  <div id="choices"></div>
</div>

<h3>🏆 今日のランキング</h3>
<div id="ranking"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAD4I9A3vs0a-PabuxGZHqiJa30Qz-T9Zw",
  authDomain: "pronoun-game-c64f4.firebaseapp.com",
  projectId: "pronoun-game-c64f4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const today = new Date().toISOString().slice(0,10);

let score=0, time=0, correct, timer;
let combo=0;
let gameActive = false; // ←重要（クリック制御）

const data = [
 ["I","my","me","mine"],
 ["you","your","you","yours"],
 ["he","his","him","his"],
 ["she","her","her","hers"],
 ["it","its","it",null],
 ["we","our","us","ours"],
 ["you","your","you","yours"],
 ["they","their","them","theirs"]
];

const answers = [
"I","my","me","mine","you","your","yours",
"he","his","him","she","her","hers",
"it","its","we","our","us","ours",
"they","their","them","theirs"
];

function pickCell(){
 let r,c;
 do{
  r=Math.floor(Math.random()*data.length);
  c=Math.floor(Math.random()*4);
 }while(data[r][c]==null);
 return {r,c};
}

function newQ(){
 if(!gameActive) return;

 let {r,c} = pickCell();
 correct = data[r][c];

 let html="<table><tr><th>～は</th><th>～の</th><th>～を</th><th>～のもの</th></tr>";
 data.forEach((row,i)=>{
  html+="<tr>";
  row.forEach((cellVal,j)=>{
   html += (i==r && j==c) ? "<td class='blank'>???</td>" : `<td>${cellVal||""}</td>`;
  });
  html+="</tr>";
 });
 html+="</table>";
 document.getElementById("table").innerHTML=html;

 let opts=[...answers].sort(()=>Math.random()-0.5).slice(0,8);
 if(!opts.includes(correct)) opts[Math.floor(Math.random()*8)] = correct;

 let cdiv=document.getElementById("choices");
 cdiv.innerHTML="";
 opts.forEach(o=>{
  let b=document.createElement("button");
  b.innerText=o;
  b.onclick=()=>check(o,b);
  cdiv.appendChild(b);
 });
}

function check(a,btn){
 if(!gameActive) return; // ←クリック無効

 if(a==correct){
  combo++;
  score++;
  btn.classList.add("correct");
 } else {
  combo=0;
  btn.classList.add("wrong");
 }

 updateDisplay();
 setTimeout(newQ,200);
}

function updateDisplay(){
 document.getElementById("score").innerText="Score: "+score;
 document.getElementById("combo").innerText="Combo: "+combo;
}

function start(sec){
 const name = document.getElementById("name").value || "名無し";
 const className = document.getElementById("class").value || "未設定";

 score=0; combo=0; time=sec;
 gameActive = true; // ←開始

 updateDisplay();

 clearInterval(timer);
 timer=setInterval(()=>{
  time--;
  document.getElementById("timer").innerText="Time: "+time;

  if(time<=0){
   clearInterval(timer);
   gameActive = false; // ←終了でクリック禁止
   saveScore(name, score, className);
   loadRanking(className);
  }
 },1000);

 newQ();
}

function saveScore(name, score, className){
 db.collection("scores").add({
   name:name,
   score:score,
   class:className,
   date:today
 });
}

function loadRanking(className){
 db.collection("scores")
   .where("class","==",className)
   .where("date","==",today)
   .orderBy("score","desc")
   .limit(10)
   .get()
   .then(snapshot=>{
     let html="";
     let rank=1;
     snapshot.forEach(doc=>{
       const d=doc.data();
       html += rank+"位 "+d.name+" : "+d.score+"<br>";
       rank++;
     });
     document.getElementById("ranking").innerHTML=html;
   });
}

</script>

</body>
</html>
